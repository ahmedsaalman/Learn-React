<!DOCTYPE html>
<html>
  <head>
    <title>ChatBot</title>
  </head>
  <body>
    <div class="js-container"></div>

    
    
    
    
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    
    
    
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
     function ChatInput()
     {
        return (
            <div>
                <input placeholder = "Chat with the bot" size ="30"></input>
                <button>Send</button>
            </div>


        );
     }
     //every component gets 1 parameter as a "prop"
     function ChatMessage(props)
     {
       const msg =  props.message
       const sender = props.sender
       let imgdata = "user.png"
    //    if (sender === "bot")
    //    {
    //       imgdata = "bot.png"

    //    }
        return(
        <div>
            {sender === 'bot' && 
            ( <img src = 'bot.png' width = "50"></img>)
            }
            {msg}
            {sender === "user" && (
                <img src= {imgdata} width = "50"></img>)}
        </div>
     );

     }

     function App(){
        return(

        <>
            
             <ChatInput></ChatInput> 
              
             <ChatMessage message = "hello chbudatbot" sender = "user" />
             <ChatMessage message = "Hello! How can I help you?" sender = "bot" />
             <ChatMessage message = "Can you get me todays date?" sender = "user" />
             <ChatMessage message = "Todays September 27" sender = "bot" />
        </>

        );
     }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />)
    </script>
  </body>
</html>
